<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建中社團線上點名系統</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E7%A4%BE.png">
  <meta property="og:title" content="建中社團線上點名系統">
  <meta property="og:description" content="請使用@gl.ck.tp.edu.tw帳號填寫">
  <meta property="og:image"
    content="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E9%A0%90%E8%A6%BD.png">
  <meta property="og:type" content="website">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline' https://accounts.google.com;
    img-src 'self' https://raw.githubusercontent.com https://*.googleusercontent.com data:;
    connect-src https://script.google.com https://accounts.google.com https://script.googleusercontent.com/;
    frame-src https://accounts.google.com;
    base-uri 'self';
    object-src 'none';
    form-action 'self';">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="form">
  <header id="siteHeader" style="cursor:pointer;">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E6%A0%A1%E5%BE%BD.png"
        style="width:38px;height:38px;object-fit:contain;" alt="建中校徽">
    </div>
    <div>
      <h1>建中社團線上點名系統</h1>
    </div>
  </header>

  <div class="card">
    <div id="formArea">
      <input type="hidden" id="club">
      <input type="hidden" id="fillerName">
      <input type="hidden" id="fillerInfo">

      <div class="form-group">
        <label>社團</label>
        <input type="text" id="identityClubName" readonly>
      </div>

      <div class="form-group">
        <label>社課日期</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label>填寫人</label>
        <input type="text" id="identityWriter" readonly>
      </div>

      <hr class="divider">

      <div class="form-group">
        <label>社課內容簡述</label>
        <textarea id="desc" placeholder="請簡述今日社課內容…" maxlength="200"></textarea>
        <div class="char-counter" id="descCounter">0 / 200</div>
      </div>

      <div class="form-group">
        <label>指導老師是否出席</label>
        <select id="teacherPresent">
          <option value="是">是</option>
          <option value="否">否</option>
        </select>
      </div>

      <div class="form-group" id="subTeacherGroup" style="display:none;">
        <label>代課老師姓名</label>
        <span class="hint">若無代課老師請保留「無」</span>
        <input type="text" id="subTeacher" value="無" maxlength="30">
      </div>

      <div class="form-group">
        <label>老師簽名</label>
        <button id="sigOpenBtn" type="button">點擊開啟簽名板</button>
        <div id="sigStatus">尚未簽名</div>
      </div>

      <div id="sigModal" class="modal-overlay">
        <div class="modal-content">
          <h3>老師請在此簽名</h3>
          <canvas id="sigCanvas"></canvas>
          <div class="btn-group">
            <button class="btn btn-red" id="sigClearBtn" type="button">清除重簽</button>
            <button class="btn btn-green" id="sigCloseBtn" type="button">確認並關閉</button>
          </div>
        </div>
      </div>

      <hr class="divider">

      <div class="form-group">
        <label>點名區 <span id="attendCount" style="font-weight:400;color:var(--gray-500);font-size:.85rem;"></span></label>
        <div id="studentList" style="text-align:left;padding:24px;color:var(--gray-500);">
          <div class="spinner" style="margin:0 auto 10px;"></div>載入中…
        </div>
      </div>

      <button class="btn btn-submit" id="submitBtn">確認送出</button>
      <p style="text-align:center;margin-top:10px;">
        <a href="#" id="formFooterLink"
          style="font-size:.78rem;color:var(--gray-500);text-decoration:underline;">
          返回
        </a>
      </p>
    </div>
  </div>

  <footer>開發人員：建中80屆社審會學代 王宥鈞</footer>

  <div id="submitOverlay" class="submit-overlay">
    <div class="submit-overlay-box">
      <div class="spinner"></div>
      <p id="submitOverlayText">資料傳送中，請勿關閉網頁…</p>
    </div>
  </div>

  <div id="customDialog" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <h3 id="customDialogTitle" style="font-size: 1.15rem; margin-bottom: 12px; font-weight: 700;">提示</h3>
      <p id="customDialogMessage" style="font-size: 0.95rem; color: var(--gray-700); margin-bottom: 20px; line-height: 1.5; white-space: pre-line;"></p>
      <div class="btn-group" id="customDialogBtnGroup">
        <button class="btn btn-gray" id="customDialogCancelBtn" type="button" style="padding: 10px;">取消</button>
        <button class="btn btn-primary" id="customDialogConfirmBtn" type="button" style="padding: 10px;">確認</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
