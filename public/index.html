<head>

  <!-- 網頁建置、預覽 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建中社團線上點名系統</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E7%A4%BE.png">
  <meta property="og:title" content="建中社團線上點名系統">
  <meta property="og:description" content="請使用@gl.ck.tp.edu.tw帳號填寫">
  <meta property="og:image"
    content="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E9%A0%90%E8%A6%BD.png">
  <meta property="og:type" content="website">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline';
    img-src * data:;
    connect-src https://script.google.com https://accounts.google.com https://script.googleusercontent.com/;
    frame-src https://accounts.google.com;">


  <!-- CSS -->
  <!-- 網頁美觀 -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green: #7a9eb5;
      --green-lt: #edf2f6;
      --blue: #5b7e96;
      --blue-lt: #e8eff4;
      --red: #b07a7a;
      --red-lt: #f5eded;
      --gray-50: #f5f7f9;
      --gray-100: #eaeff3;
      --gray-300: #c8d4dc;
      --gray-500: #8fa5b5;
      --gray-700: #5c7285;
      --gray-900: #2c3e4a;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(91, 126, 150, .13);
    }

    body {
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* 標題樣式 */
    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.3;
    }

    header p {
      font-size: .8rem;
      color: var(--gray-500);
      margin-top: 2px;
    }

    /* 題目樣式 */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 640px;
    }

    /* 身分驗證頁面 */
    #loadingArea {
      text-align: center;
      padding: 48px 0;
      color: var(--gray-500);
      font-size: 1rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--gray-300);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Google登入按鈕 */
    #loginArea {
      display: none;
      text-align: center;
      padding: 32px 0 16px;
    }

    #loginArea .login-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    #loginArea .login-sub {
      font-size: .85rem;
      color: var(--gray-500);
      margin-bottom: 24px;
    }

    #g_id_signin {
      display: inline-block;
    }

    /* 外部登入頁面 */
    #teacherAuthArea {
      display: none;
      border: 2px dashed var(--blue);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 16px;
      background: var(--blue-lt);
    }

    #teacherAuthArea h3 {
      color: var(--blue);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    #teacherAuthArea p {
      font-size: .85rem;
      color: var(--gray-700);
      margin-bottom: 16px;
    }

    /* 表單頁面 */
    #formArea {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      color: var(--gray-700);
      margin-bottom: 6px;
    }

    .form-group .hint {
      font-size: .78rem;
      color: var(--gray-500);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      color: var(--gray-900);
      background: #fff;
      transition: border-color .2s;
      appearance: auto;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26, 127, 75, .15);
    }

    input[readonly],
    input[disabled] {
      background: var(--gray-100);
      color: var(--gray-700);
      cursor: not-allowed;
      border-color: var(--gray-300);
    }

    textarea {
      height: 88px;
      resize: vertical;
    }

    /* 點名表 */
    #studentList {
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      max-height: 380px;
      overflow-y: auto;
      background: #fff;
    }

    .student-item {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px dashed var(--gray-300);
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s, color .2s;
      background: var(--red-lt);
      color: var(--red);
    }

    .student-item:last-child {
      border-bottom: none;
    }

    .student-item.present {
      background: var(--green-lt);
      color: var(--green);
    }

    .student-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 12px;
      accent-color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
    }

    .student-item label {
      cursor: pointer;
      flex: 1;
    }

    /* 點擊簽名 */
    #sigOpenBtn {
      background: var(--gray-100);
      border: 1.5px solid var(--gray-300);
      color: var(--gray-700);
      border-radius: var(--radius);
      padding: 10px;
      font-size: .95rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background .2s;
    }

    #sigOpenBtn:hover {
      background: var(--gray-300);
    }

    #sigStatus {
      display: none;
      color: var(--green);
      font-weight: 600;
      font-size: .9rem;
      text-align: center;
      margin-top: 10px;
    }

    /* 簽名面板 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 20px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
    }

    .modal-content h3 {
      font-size: 1.05rem;
      text-align: center;
      margin-bottom: 14px;
      color: var(--gray-900);
    }

    #sigCanvas {
      width: 100%;
      height: 180px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      display: block;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-group button {
      flex: 1;
    }

    /* 按鈕 */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      font-family: inherit;
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
    }

    .btn-green {
      background: var(--green);
      color: #fff;
    }

    .btn-red {
      background: var(--red);
      color: #fff;
    }

    .btn-gray {
      background: var(--gray-500);
      color: #fff;
    }

    .btn-submit {
      background: var(--blue);
      color: #fff;
      margin-top: 6px;
      font-size: 1.05rem;
    }

    /* 分隔線 */
    .divider {
      border: none;
      border-top: 1px solid var(--gray-300);
      margin: 20px 0;
    }

    /* 開發人員 */
    footer {
      margin-top: 24px;
      font-size: .78rem;
      color: var(--gray-500);
      text-align: center;
    }

    /* 記錄列表 */
    .record-item {
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-100);
      background: var(--gray-50);
      margin-bottom: 8px;
      font-size: .93rem;
      color: var(--gray-900);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .record-item::before {
      content: '📋';
      font-size: .9rem;
      flex-shrink: 0;
    }

    .record-item:hover {
      background: var(--blue-lt);
      border-color: var(--blue);
    }

    #recordDetailArea {
      font-size: .93rem;
    }

    /* 主選單左右按鈕 */
    .menu-btn-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-menu-green {
      background: #4a9b8e;
      color: #fff;
      flex: 1;
      padding: 18px 10px;
      font-size: .95rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-radius: 12px;
      line-height: 1.3;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: opacity .2s;
    }

    .btn-menu-blue {
      background: #5872a7;
      color: #fff;
      flex: 1;
      padding: 18px 10px;
      font-size: .95rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-radius: 12px;
      line-height: 1.3;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: opacity .2s;
    }

    .btn-menu-green:hover, .btn-menu-blue:hover { opacity: .85; }
    .btn-menu-green[style*="display: none"] + .btn-menu-blue {
      width: 100%;
    }

    .menu-btn-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    /* 點名詳細資訊卡 */
    .detail-card {
      background: #fff;
      border-radius: var(--radius);
      border: 1.5px solid var(--gray-100);
      overflow: hidden;
      margin-bottom: 4px;
    }

    .detail-row {
      display: flex;
      padding: 10px 14px;
      border-bottom: 1px solid var(--gray-100);
      font-size: .92rem;
      gap: 10px;
      align-items: flex-start;
    }

    .detail-row:last-child { border-bottom: none; }

    .detail-label {
      color: var(--gray-500);
      font-size: .82rem;
      font-weight: 600;
      min-width: 72px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .detail-row-absent {
      flex-direction: column;
      gap: 6px;
    }

    .absent-box {
      white-space: pre-wrap;
      background: #fff;
      border: 1.5px dashed var(--gray-300);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: .9rem;
      color: var(--gray-700);
      line-height: 1.7;
    }

    .char-counter {
      font-size: .75rem;
      color: var(--gray-500);
      text-align: right;
      margin-top: 3px;
    }

    .char-counter.warn {
      color: var(--red);
      font-weight: 600;
    }
  </style>

  <!-- 登入按鈕 -->
  <script src="https://accounts.google.com/gsi/client" onload="initGoogleSignIn()" async defer>
  </script>

<body>

  <header>
    <div class="logo">
      <img src="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E6%A0%A1%E5%BE%BD.png"
        style="width:38px;height:38px;object-fit:contain;" alt="建中校徽">
    </div>
    <div>
      <h1>建中社團線上點名系統</h1>
    </div>
  </header>

  <div class="card">

    <!-- 身分驗證頁面 -->
    <div id="loadingArea" style="display:none;">
      <div class="spinner"></div>
      正在搜尋身分，請稍後...
    </div>

    <!-- 登入Google帳號頁面 -->
    <div id="loginArea">
      <p class="login-title">請使用學校 Google 帳號登入</p>
      <div id="g_id_signin"></div>
    </div>

    <!-- 外部帳號登入 -->
    <div id="teacherAuthArea">
      <h3>測試登入</h3>
      <p>您的帳號不在學生名單中，請使用學校 Google帳號登入。</p>
      <p>若欲測試本系統，請聯絡管理員協助建立測試用帳號與密碼。</p>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="teacherEmail" placeholder="請輸入電子郵件" maxlength="100" autocomplete="email">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="teacherPassword" placeholder="請輸入測試密碼" maxlength="100"
          autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>社團</label>
        <input type="text" id="testClub" placeholder="需與現有社團名稱完全一致" maxlength="30">
      </div>
      <div class="form-group">
        <label>身分</label>
        <select id="testIdentity">
          <option value="幹部">幹部</option>
          <option value="社員">社員</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="submitTeacherAuth()" id="teacherAuthBtn" style="margin-top:8px;">登入</button>
    </div>
    
    <div id="menuArea" style="display:none;">
      <div class="menu-btn-row">
        <button class="btn btn-menu-green" id="btnNewForm" onclick="showNewForm()">
          <span class="menu-btn-icon">✏️</span>填寫新點名
        </button>
        <button class="btn btn-menu-blue" onclick="showRecords()">
          <span class="menu-btn-icon">📋</span>查看點名紀錄
        </button>
      </div>
      <p style="text-align:center;margin-top:14px;">
        <a href="#" id="menuFooterLink" onclick="switchAccount(); return false;"
          style="font-size:.78rem;color:var(--gray-500);text-decoration:underline;">
          切換帳號／登出
        </a>
      </p>
    </div>

    <!-- 點名表單 -->
    <div id="formArea">
      <input type="hidden" id="club">
      <input type="hidden" id="fillerName">
      <input type="hidden" id="fillerInfo">

      <!-- 社團 -->
      <div class="form-group">
        <label>社團</label>
        <input type="text" id="identityClubName" readonly>
      </div>

      <!-- 社課日期 -->
      <div class="form-group">
        <label>社課日期</label>
        <input type="date" id="date" onchange="saveDraft()">
      </div>

      <!-- 填寫人 -->
      <div class="form-group">
        <label>填寫人</label>
        <input type="text" id="identityWriter" readonly>
      </div>

      <hr class="divider">

      <!-- 社課內容 -->
      <div class="form-group">
        <label>社課內容簡述</label>
        <textarea id="desc" placeholder="請簡述今日社課內容…" maxlength="200"
          oninput="updateCharCounter(this, 'descCounter', 200); saveDraft()"></textarea>
        <div class="char-counter" id="descCounter">0 / 200</div>
      </div>

      <!-- 指導老師出席 -->
      <div class="form-group">
        <label>指導老師是否出席</label>
        <select id="teacherPresent" onchange="toggleSubTeacher(); saveDraft()">
          <option value="是">是</option>
          <option value="否">否</option>
        </select>
      </div>

      <!-- 代課老師（老師未出席時顯示） -->
      <div class="form-group" id="subTeacherGroup" style="display:none;">
        <label>代課老師姓名</label>
        <span class="hint">若無代課老師請保留「無」</span>
        <input type="text" id="subTeacher" value="無" maxlength="30" onchange="saveDraft()">
      </div>

      <!-- 老師簽名 -->
      <div class="form-group">
        <label>老師簽名</label>
        <button id="sigOpenBtn" type="button" onclick="openSigModal()">點擊開啟簽名板</button>
        <div id="sigStatus">✅ 已完成簽名</div>
      </div>

      <!-- 簽名 Modal -->
      <div id="sigModal" class="modal-overlay">
        <div class="modal-content">
          <h3>老師請在此簽名</h3>
          <canvas id="sigCanvas"></canvas>
          <div class="btn-group">
            <button class="btn btn-red" type="button" onclick="clearCanvas()">清除重簽</button>
            <button class="btn btn-green" type="button" onclick="closeSigModal()">確認並關閉</button>
          </div>
        </div>
      </div>

      <hr class="divider">

      <!-- 點名區 -->
      <div class="form-group">
        <label>點名區 <span id="attendCount"
            style="font-weight:400;color:var(--gray-500);font-size:.85rem;"></span></label>
        <div id="studentList" style="text-align:left;padding:24px;color:var(--gray-500);">
          <div class="spinner" style="margin:0 auto 10px;"></div>載入名單中…
        </div>
      </div>

      <!-- 送出 -->
      <button class="btn btn-submit" id="submitBtn" onclick="submitForm()">確認送出</button>
      <p style="text-align:center;margin-top:10px;">
        <a href="#" id="formFooterLink" onclick="backFromForm(); return false;"
          style="font-size:.78rem;color:var(--gray-500);text-decoration:underline;">
          ← 返回
        </a>
      </p>
    </div>

    <!-- 查看點名紀錄 -->
    <div id="recordsArea" style="display:none;">
      <div id="recordsLoading" style="text-align:center;padding:32px 0;color:var(--gray-500);">
        <div class="spinner"></div>
        載入點名紀錄中…
      </div>
      <div id="recordsList"></div>
      <div id="recordDetailArea" style="display:none;"></div>
    </div>

  <footer>開發人員：建中80屆社審會學代 王宥鈞</footer>
  </div>

        const MAX_DESC_LEN = 200;
        const MAX_TEACHER_LEN = 30;

        class PackagedUserInfo {
            #userEmail;
            #userFillerInfo;
            #club;
            #fillerName;
            constructor(email, fillerInfo, club, fillerName) {
            this.#userEmail = email;
            this.#userFillerInfo = fillerInfo;
            this.#club = club;
            this.#fillerName = fillerName;
            }

            get userEmail() {
            return this.#userEmail;
            }

            get userFillerInfo() {
            return this.#userFillerInfo;
            }

            get club() {
            return this.#club;
            }

            get fillerName() {
            return this.#fillerName;
            }
        }

        window.packagedInformation = undefined;
        let canvas, ctx, isDrawing = false, hasSigned = false, isCanvasSized = false;
        let allStudents = [];

        const DRAFT_KEY = 'attendanceDraft';

        /* 2. 底層工具函式 */
        /* 2-1. GAS API Helper */
        async function gasPost(body) {
            const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(body)
            });
            return res.json();
        }

        /* 2-2. 報錯工具 */
        function showError(msg) {
            const area = document.getElementById('loadingArea');
            area.innerHTML = '';
            const div = document.createElement('div');
            div.style.cssText = 'color:var(--red);font-size:.95rem;';
            div.textContent = msg;
            area.appendChild(div);
        }

        /* 2-3. 社員身分判斷 */
        function isOfficer(remark) {
        return remark !== '社員' && remark !== '外部登入_社員';
        }

        /* 3. 草稿管理 */
        /* 3-1. 儲存草稿 */
        function saveDraft() {
        const draft = {
            date: document.getElementById('date').value,
            desc: document.getElementById('desc').value,
            teacherPresent: document.getElementById('teacherPresent').value,
            subTeacher: document.getElementById('subTeacher').value,
            signature: hasSigned ? canvas.toDataURL('image/png') : '',
            absentIds: Array.from(document.querySelectorAll('.student-cb'))
            .filter(cb => !cb.checked)
            .map(cb => cb.id)
        };
        localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        }

        /* 3-2. 清除填答內容 */
        function clearDraft() {
        localStorage.removeItem(DRAFT_KEY);
        }

        /* 3-3. 還原草稿 */
        function restoreDraftIfExists() {
        const raw = localStorage.getItem(DRAFT_KEY);
        if (!raw) return;

        let draft;
        try { draft = JSON.parse(raw); } catch (e) { clearDraft(); return; }

        if (!confirm('偵測到上次未送出的內容，要還原嗎？')) {
            clearDraft();
            return;
        }

        if (draft.date) document.getElementById('date').value = draft.date;
        if (draft.desc) {
            document.getElementById('desc').value = draft.desc;
            updateCharCounter(document.getElementById('desc'), 'descCounter', 200);
        }
        if (draft.teacherPresent) {
            document.getElementById('teacherPresent').value = draft.teacherPresent;
            toggleSubTeacher();
        }
        if (draft.subTeacher) document.getElementById('subTeacher').value = draft.subTeacher;

        if (Array.isArray(draft.absentIds)) {
            draft.absentIds.forEach(id => {
            const cb = document.getElementById(id);
            if (cb) cb.dispatchEvent(new Event('__noop')); // 佔位，避免 lint，可省略
            });
            document.querySelectorAll('.student-cb').forEach(cb => {
            cb.checked = !draft.absentIds.includes(cb.id);
            cb.dispatchEvent(new Event('change'));
            });
        }

        if (draft.signature) {
            const img = new Image();
            img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            hasSigned = true;
            document.getElementById('sigStatus').style.display = 'block';
            };
            img.src = draft.signature;
        }
        }

        /* 4. UI 小工具 */
        /* 4-1. 日期計算機 */
        function initDatePicker() {
        const input = document.getElementById('date');
        const today = new Date();
        const tz = today.getTimezoneOffset() * 60000;
        const max = new Date(today.getTime() - tz).toISOString().split('T')[0];
        const min = new Date(today.getTime() - 4 * 86400000 - tz).toISOString().split('T')[0];
        input.max = max;
        input.min = min;
        input.value = max;
        }

        /* 4-2. 代課老師顯示切換 */
        function toggleSubTeacher() {
        const present = document.getElementById('teacherPresent').value;
        const grp = document.getElementById('subTeacherGroup');
        const inp = document.getElementById('subTeacher');
        if (present === '否') {
            grp.style.display = 'block';
        } else {
            grp.style.display = 'none';
            inp.value = '無';
        }
        }

        /* 4-3. 字元計數器 */
        function updateCharCounter(el, counterId, max) {
        const len = el.value.length;
        const counter = document.getElementById(counterId);
        counter.textContent = len + ' / ' + max;
        counter.classList.toggle('warn', len >= max * 0.9);
        }

        /* 4-4. 切換帳號/登出 */
        function switchAccount() {
        localStorage.removeItem('cachedUserInfo');
        google.accounts.id.disableAutoSelect();
        location.reload();
        }

        /* 5. 簽名板功能 */
        /* 5-1. 初始化 Canvas */
        function initCanvas() {
        canvas = document.getElementById('sigCanvas');
        ctx = canvas.getContext('2d');

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return { x: src.clientX - r.left, y: src.clientY - r.top };
        };
        const start = (e) => { isDrawing = true; window._keepOriginalSignature = false; draw(e); };
        const stop = () => { isDrawing = false; ctx.beginPath(); };
        const draw = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            hasSigned = true;
            const p = getPos(e);
            ctx.lineWidth = 2.5; ctx.lineCap = 'round';
            ctx.lineTo(p.x, p.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
        };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stop);
        }

        /* 5-2. 開啟簽名 Modal */
        function openSigModal() {
        document.getElementById('sigModal').classList.add('open');
        if (!isCanvasSized) {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            isCanvasSized = true;
        }
        }

        /* 5-3. 清除簽名 */
        function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasSigned = false;
        }

        /* 5-4. 關閉簽名 Modal */
        function closeSigModal() {
        document.getElementById('sigModal').classList.remove('open');
        if (!window._keepOriginalSignature) {
            document.getElementById('sigStatus').textContent = '✅ 已完成簽名';
        }
        document.getElementById('sigStatus').style.display = hasSigned ? 'block' : 'none';
        saveDraft();
        }

        /* 6. 登入流程 */
        /* 6-1-1. 初始化 Google Sign-In */
        function initGoogleSignIn() {
            google.accounts.id.initialize({
            client_id: CLIENT_ID,
            callback: handleGoogleCredential,
            auto_select: true,
            cancel_on_tap_outside: false
            });
            showLoginButton();
            initDatePicker();
        }

        /* 6-1-2. 顯示登入按鈕 */
        function showLoginButton() {
            const raw = localStorage.getItem('cachedUserInfo');
            if (raw) {
            try {
                const cached = JSON.parse(raw);
                const now = Date.now();
                const CACHE_TTL = 14 * 24 * 60 * 60 * 1000; // 兩周
                if (cached._ts && (now - cached._ts) < CACHE_TTL) {
                renderForm(cached);
                return;
                }
            } catch (e) { /* 快取損毀，清除 */ }
            localStorage.removeItem('cachedUserInfo');
            }
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('loginArea').style.display = 'block';
            google.accounts.id.renderButton(
            document.getElementById('g_id_signin'),
            { theme: 'outline', size: 'large', locale: 'zh-TW', text: 'signin_with' }
            );
        }

        /* 6-1-3. 處理 Google 登入回傳 */
        async function handleGoogleCredential(response) {
        window.googleToken = response.credential; // 把 Token 存起來
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('loadingArea').style.display = 'block';
        try {
            const base64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(atob(base64));
            const email = payload.email;
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showError('無效的帳號格式，請重試。');
            return;
            }
            await fetchUserInfo(email);
        } catch (e) {
            showError('登入憑證解析失敗，請重試。');
        }
        }

        /* 6-1-4. 從 GAS 取得使用者資訊 */
        async function fetchUserInfo(email) {
        try {
            const res = await gasPost({ action: 'getLoginUser', email });
            handleUserInfo(res, email);
        } catch (err) {
            showError('無法連線至伺服器，請稍後再試。');
        }
        }

        /* 6-1-5. 處理使用者資訊 */
        function handleUserInfo(info, email) {
        document.getElementById('loadingArea').style.display = 'none';

        if (info.needManualLogin) {
            document.getElementById('teacherAuthArea').style.display = 'block';
            if (info.defaultEmail) document.getElementById('teacherEmail').value = info.defaultEmail;
            return;
        }
        if (info.error) { showError('驗證失敗，請重新整理頁面再試。'); return; }
        renderForm(info);
        }

        /* 6-2. 外部登入 */
        async function submitTeacherAuth() {
        const email = document.getElementById('teacherEmail').value.trim();
        const password = document.getElementById('teacherPassword').value.trim();
        const club = document.getElementById('testClub').value.trim();
        const identity = document.getElementById('testIdentity').value;

        if (!email || !password || !club) { alert('錯誤: 請完整填寫所有欄位！'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('錯誤: Email 格式不正確！'); return; }
        if (club.length > 30) { alert('錯誤: 社團名稱過長！'); return; }

        const btn = document.getElementById('teacherAuthBtn');
        btn.disabled = true; btn.textContent = '驗證中…';

        try {
            const res = await gasPost({ action: 'verifyTestLogin', email, password, club, identity });
            btn.disabled = false; btn.textContent = '登入';
            if (res.error) { alert('❌ ' + res.msg); return; }
            document.getElementById('teacherAuthArea').style.display = 'none';
            renderForm(res);
        } catch (err) {
            btn.disabled = false; btn.textContent = '登入';
            alert('連線失敗，請稍後再試。');
        }
        }

        /* 7. 主頁面邏輯 */
        /* 7-1. 渲染表單 */
        function renderForm(info) {
        const toCache = Object.assign({}, info, { _ts: Date.now() });
        localStorage.setItem('cachedUserInfo', JSON.stringify(toCache));

        window._loginInfo = info;

        let userFillerInfo = (info.remark || '') + '-' + (info.class || '') + ' ' + (info.no || '') + ' ' + (info.name || '');
        const tempPackagedInformation = Object.freeze(
            new PackagedUserInfo(info.email || '', userFillerInfo, info.club || '', info.name || '')
        );
        Object.defineProperty(window, "packagedInformation", {
            value: tempPackagedInformation, writable: false, configurable: false, enumerable: true,
        });

        document.getElementById('menuArea').style.display = 'block';
        document.getElementById('btnNewForm').style.display =
            isOfficer(info.remark) ? 'flex' : 'none';
        }

        /* 7-2. 顯示新表單 */
        function showNewForm() {
        document.getElementById('menuArea').style.display = 'none';
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('date').disabled = false;

        const info = window._loginInfo;
        document.getElementById('club').value = info.club || '';
        document.getElementById('fillerName').value = info.name || '';
        document.getElementById('fillerInfo').value =
            (info.remark || '') + '-' + (info.class || '') + ' ' + (info.no || '') + ' ' + (info.name || '');
        document.getElementById('identityClubName').value = (info.clubId || '') + ' ' + (info.club || '');
        document.getElementById('identityWriter').value = (info.remark || '') + ' ' + (info.name || '');

        document.getElementById('submitBtn').textContent = '確認送出';
        document.getElementById('submitBtn').onclick = submitForm;
        document.getElementById('formFooterLink').textContent = '← 返回選單';
        document.getElementById('formFooterLink').onclick = function() {
            document.getElementById('formArea').style.display = 'none';
            document.getElementById('menuArea').style.display = 'block';
            return false;
        };

        initCanvas();
        loadStudents(info.club);
        }

        /* 8. 名單與送出 */
        /* 8-1-1. 載入社團名單 */
        async function loadStudents(clubName) {
        try {
            const students = await gasPost({ action: 'getClubMembers', clubName });
            renderStudents(students);
        } catch (err) {
            document.getElementById('studentList').textContent = '名單載入失敗，請重新整理。';
        }
        }

        /* 8-1-2. 渲染社團名單 */
        function renderStudents(students) {
        allStudents = students;
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = '';

        if (!students || students.length === 0) {
            listDiv.textContent = '找不到該社團名單，請聯絡社活組。';
            return;
        }

        students.forEach(s => {
            const text = `${s.class} ${s.no} ${s.name}`;
            const item = document.createElement('div');
            item.className = 'student-item';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'student-cb';
            cb.value = text;
            cb.id = 'cb_' + s.id;
            cb.addEventListener('change', () => {
            item.classList.toggle('present', cb.checked);
            updateCount();
            saveDraft(); 
            });

            const lbl = document.createElement('label');
            lbl.htmlFor = cb.id;
            lbl.textContent = text;   // ★ textContent，非 innerHTML

            item.appendChild(cb);
            item.appendChild(lbl);
            listDiv.appendChild(item);
        });

        updateCount();
        restoreDraftIfExists();
        }

        /* 8-1-3. 即時顯示出席人數 */
        function updateCount() {
        const total = allStudents.length;
        const present = document.querySelectorAll('.student-cb:checked').length;
        document.getElementById('attendCount').textContent = `（出席 ${present} / ${total} 人）`;
        }

        /* 8-2. 送出表單 */
        async function submitForm() {
        const btn = document.getElementById('submitBtn');

        const descEl = document.getElementById('desc');
        const desc = descEl.value.trim();

        if (!desc) { alert('錯誤: 請填寫社課內容簡述！'); return; }
        if (desc.length > MAX_DESC_LEN) { alert(`錯誤: 社課內容不可超過 ${MAX_DESC_LEN} 字！`); return; }
        if (!hasSigned) { alert('錯誤: 請完成老師簽名！'); return; }

        const subTeacherEl = document.getElementById('subTeacher');
        const subTeacherVal = subTeacherEl.value.trim() || '無';
        if (subTeacherVal.length > MAX_TEACHER_LEN) {
            alert(`錯誤: 代課老師姓名不可超過 ${MAX_TEACHER_LEN} 字！`);
            return;
        }

        const dateInput = document.getElementById('date');
        const dateVal = dateInput.value;
        if (!dateVal || (!dateInput.disabled && (dateVal < dateInput.min || dateVal > dateInput.max))) {
          alert('錯誤: 日期超出允許範圍！');
           return;
        }

        const checkboxes = document.querySelectorAll('.student-cb');
        let absentList = [];
        let presentCount = 0;

        checkboxes.forEach(cb => {
            if (cb.checked) presentCount++;
            else absentList.push(cb.value);
        });

        const data = {
            token: window.googleToken,
            email: window.packagedInformation.userEmail,
            fillerInfo: window.packagedInformation.fillerInfo,
            club: window.packagedInformation.club,
            date: dateVal,
            fillerName: window.packagedInformation.fillerName,
            desc: desc,
            teacherPresent: document.getElementById('teacherPresent').value === '是' ? '是' : '否',
            subTeacher: subTeacherVal,
            presentCount: presentCount,
            absentList: absentList.length > 0 ? absentList.join('\n') : '全勤',
            signature: window._keepOriginalSignature ? 'KEEP' : (hasSigned ? canvas.toDataURL('image/png') : '')
        };

        btn.disabled = true;
        btn.textContent = '資料傳送中，請勿關閉網頁…';

        try {
            const res = await gasPost({ action: 'submitAttendance', data });
        if (res === 'SUCCESS' || res?.status !== 'error') {
            alert('✅ 送出成功！');
            btn.disabled = false;
            btn.textContent = '確認送出';
            document.getElementById('formArea').style.display = 'none';
            document.getElementById('date').disabled = false;   // 如果是修改模式進來的，記得解鎖日期欄
            clearDraft();                                        // 如果你做了上一步的草稿快取，順手清掉
            showRecords();
        } else {
            alert('送出失敗：' + (res.message || '未知錯誤'));
            btn.disabled = false;
            btn.textContent = '確認送出';
        }
        } catch (err) {
            alert('連線失敗，請稍後再試。');
            btn.disabled = false;
            btn.textContent = '確認送出';
        }
        }

        /* 9. 查看紀錄 */
        /* 9-1. 顯示紀錄列表 */
        async function showRecords() {
        document.getElementById('menuArea').style.display = 'none';
        document.getElementById('recordsArea').style.display = 'block';
        document.getElementById('recordsLoading').style.display = 'block';
        document.getElementById('recordsBackLink').style.display = 'none';
        document.getElementById('recordsList').innerHTML = '';
        const info = window._loginInfo;

        if (isOfficer(info.remark)) {
            const list = await gasPost({ action: 'getAttendanceList', club: info.club });
            document.getElementById('recordsLoading').style.display = 'none';
            renderOfficerRecordList(list);
        } else {
            const identity = `${info.class} ${info.no} ${info.name}`;
            const list = await gasPost({ action: 'getMyAttendance', club: info.club, identity });
            document.getElementById('recordsLoading').style.display = 'none';
            renderMemberRecordList(list);
        }
        }

        /* 9-2. 返回選單 */
        function renderOfficerRecordList(list) {
            document.getElementById('recordsBackLink').style.display = 'block';
            const div = document.getElementById('recordsList');
            div.innerHTML = '';
            if (!list.length) { div.textContent = '尚無點名紀錄。'; return; }

            list.forEach(r => {
                const item = document.createElement('div');
                item.className = 'record-item';
                item.textContent = `${r.date}（填寫人：${r.fillerName}）`;
                item.onclick = () => showRecordDetail(r.date);
                div.appendChild(item);
            });
        }

        /* 9-3. 顯示個人出缺列表 */
        function renderMemberRecordList(list) {
            document.getElementById('recordsBackLink').style.display = 'block';
            const div = document.getElementById('recordsList');
            div.innerHTML = '';
            if (!list.length) { div.textContent = '尚無點名紀錄。'; return; }

            list.forEach(r => {
                const item = document.createElement('div');
                item.className = 'record-item';
                item.textContent = `${r.date}：${r.status}`;
                item.style.color = r.status === '缺席' ? '#c00' : '#137333';
                div.appendChild(item);
            });
        }

        /* 9-4. 顯示紀錄詳細資訊 */
        async function showRecordDetail(date) {
            const info = window._loginInfo;

            document.getElementById('recordsList').style.display = 'none';
            const detailDiv = document.getElementById('recordDetailArea');
            detailDiv.style.display = 'block';
            detailDiv.innerHTML = `<div style="text-align:center;padding:24px 0;color:var(--gray-500);"><div class="spinner" style="margin:0 auto 10px;"></div>載入中…</div>`;

            const r = await gasPost({ action: 'getAttendanceDetail', club: info.club, date });

            if (r.status === 'error') {
                alert(r.message || '讀取失敗');
                detailDiv.style.display = 'none';
                document.getElementById('recordsList').style.display = 'block';
                return;
            }

            detailDiv.innerHTML = `
                <div class="detail-card">
                  <div class="detail-row"><span class="detail-label">社課日期</span><span>${r.date}</span></div>
                  <div class="detail-row"><span class="detail-label">填寫人</span><span>${r.fillerName}</span></div>
                  <div class="detail-row"><span class="detail-label">社課內容</span><span>${r.desc}</span></div>
                  <div class="detail-row"><span class="detail-label">老師出席</span><span>${r.teacherPresent}（代課：${r.subTeacher}）</span></div>
                  <div class="detail-row"><span class="detail-label">實到人數</span><span>${r.presentCount} 人</span></div>
                  <div class="detail-row detail-row-absent">
                    <span class="detail-label">缺席名單</span>
                    <div class="absent-box">${r.absentList}</div>
                  </div>
                </div>
                ${r.editable ? `<button class="btn btn-primary" id="editRecordBtn" style="margin-top:14px;">✏️ 修改點名紀錄</button>` : ''}
                <p style="text-align:center;margin-top:10px;">
                  <a href="#" onclick="backToDetailList(); return false;"
                    style="font-size:.78rem;color:var(--gray-500);text-decoration:underline;">← 返回清單</a>
                </p>
            `;

            if (r.editable) {
                document.getElementById('editRecordBtn').onclick = () => enterEditMode(r);
            }
        }

        /* 9-5. 返回紀錄清單 */
        function backToDetailList() {
            document.getElementById('recordDetailArea').style.display = 'none';
            document.getElementById('recordsList').style.display = 'block';
        }

        /* 9-6. 進入修改模式 */
        function enterEditMode(record) {
            clearDraft();
            window._editingDate = record.date;
            document.getElementById('recordsArea').style.display = 'none';
            document.getElementById('recordDetailArea').style.display = 'none';
            document.getElementById('formArea').style.display = 'block';

            const info = window._loginInfo;
            document.getElementById('club').value = info.club || '';
            document.getElementById('identityClubName').value = (info.clubId || '') + ' ' + (info.club || '');
            document.getElementById('identityWriter').value = (info.remark || '') + ' ' + (info.name || '');
            document.getElementById('date').value = record.date;
            document.getElementById('date').disabled = true;
            document.getElementById('desc').value = record.desc;
            document.getElementById('teacherPresent').value = record.teacherPresent;
            toggleSubTeacher();
            document.getElementById('subTeacher').value = record.subTeacher;

            // 缺席勾選還原
            loadStudents(info.club).then(() => {
                const absentSet = new Set(String(record.absentList || '').split('\n'));
                document.querySelectorAll('.student-cb').forEach(cb => {
                cb.checked = !absentSet.has(cb.value);
                cb.dispatchEvent(new Event('change'));
                });
            });

            initCanvas();
            hasSigned = true;
            window._keepOriginalSignature = true;
            const sigStatus = document.getElementById('sigStatus');
            sigStatus.textContent = '✅ 使用原有簽名（重新簽名可覆蓋）';
            sigStatus.style.display = 'block';

            document.getElementById('submitBtn').textContent = '確認修改';
            document.getElementById('submitBtn').onclick = submitForm;
            document.getElementById('formFooterLink').textContent = '← 返回';
            document.getElementById('formFooterLink').onclick = function() {
                document.getElementById('formArea').style.display = 'none';
                document.getElementById('date').disabled = false;
                showRecords();
                return false;
            };
        }

        /* 10. 返回選單 */
        function backToMenu() {
        document.getElementById('recordsArea').style.display = 'none';
        document.getElementById('recordsList').style.display = 'block';
        document.getElementById('recordDetailArea').style.display = 'none';
        document.getElementById('menuArea').style.display = 'block';
        }
    </script>
</body>

</html>
