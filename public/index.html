<head>

  <title>建中社團線上點名系統</title>
  <meta property="og:title" content="建中社團線上點名系統">
  <meta property="og:description" content="請使用@gl.ck.tp.edu.tw帳號填寫">
  <meta property="og:image" content="https://github.com/ckclubrollcall/-/blob/main/78e1d4b8-2dea-45fc-9416-0837e20c3bb2.jpg">

    content=
    "default-src 'self';
    script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline';
    img-src * data:;
    connect-src https://script.google.com https://accounts.google.com https://script.googleusercontent.com/;
    frame-src https://accounts.google.com;"
  >

  <!-- 登入按鈕 -->
  <script
  src="https://accounts.google.com/gsi/client"
  onload="initGoogleSignIn()"
  async defer>
  </script>

  <!-- 網頁美觀 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
    --green:   #7a9eb5;
    --green-lt:#edf2f6;
    --blue:    #5b7e96;
    --blue-lt: #e8eff4;
    --red:     #b07a7a;
    --red-lt:  #f5eded;
    --gray-50: #f5f7f9;
    --gray-100:#eaeff3;
    --gray-300:#c8d4dc;
    --gray-500:#8fa5b5;
    --gray-700:#5c7285;
    --gray-900:#2c3e4a;
    --radius:  8px;
    --shadow:  0 2px 12px rgba(91,126,150,.13);
    }

    body {
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* 標題樣式 */
    header {
      width: 100%;
      max-width: 640px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      justify-content: center;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: var(--gray-900); line-height: 1.3; }
    header p  { font-size: .8rem; color: var(--gray-500); margin-top: 2px; }

    /* 題目樣式 */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 640px;
    }

    /* 身分驗證頁面 */
    #loadingArea {
      text-align: center;
      padding: 48px 0;
      color: var(--gray-500);
      font-size: 1rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-300);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Google登入按鈕 */
    #loginArea {
      display: none;
      text-align: center;
      padding: 32px 0 16px;
    }
    #loginArea .login-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
    #loginArea .login-sub   { font-size: .85rem; color: var(--gray-500); margin-bottom: 24px; }
    #g_id_signin            { display: inline-block; }

    /* 外部登入頁面 */
    #teacherAuthArea {
      display: none;
      border: 2px dashed var(--blue);
      border-radius: var(--radius);
      padding: 20px;
      margin-top: 16px;
      background: var(--blue-lt);
    }
    #teacherAuthArea h3 { color: var(--blue); font-size: 1rem; margin-bottom: 8px; }
    #teacherAuthArea p  { font-size: .85rem; color: var(--gray-700); margin-bottom: 16px; }

    /* 表單頁面 */
    #formArea { display: none; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: .9rem;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .form-group .hint {
      font-size: .78rem;
      color: var(--gray-500);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="password"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      color: var(--gray-900);
      background: #fff;
      transition: border-color .2s;
      appearance: auto;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,127,75,.15);
    }
    input[readonly], input[disabled] {
      background: var(--gray-100);
      color: var(--gray-700);
      cursor: not-allowed;
      border-color: var(--gray-300);
    }
    textarea { height: 88px; resize: vertical; }

    /* 點名表 */
    #studentList {
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      max-height: 380px;
      overflow-y: auto;
      background: #fff;
    }
    .student-item {
      display: flex;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px dashed var(--gray-300);
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s, color .2s;
      background: var(--red-lt);
      color: var(--red);
    }
    .student-item:last-child { border-bottom: none; }
    .student-item.present {
      background: var(--green-lt);
      color: var(--green);
    }
    .student-item input[type="checkbox"] {
      width: 18px; height: 18px;
      margin-right: 12px;
      accent-color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
    }
    .student-item label { cursor: pointer; flex: 1; }

    /* 點擊簽名 */
    #sigOpenBtn {
      background: var(--gray-100);
      border: 1.5px solid var(--gray-300);
      color: var(--gray-700);
      border-radius: var(--radius);
      padding: 10px;
      font-size: .95rem;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background .2s;
    }
    #sigOpenBtn:hover { background: var(--gray-300); }
    #sigStatus {
      display: none;
      color: var(--green);
      font-weight: 600;
      font-size: .9rem;
      text-align: center;
      margin-top: 10px;
    }

    /* 簽名面板 */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 14px;
      padding: 24px 20px 20px;
      width: 100%; max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-content h3 { font-size: 1.05rem; text-align: center; margin-bottom: 14px; color: var(--gray-900); }
    #sigCanvas {
      width: 100%;
      height: 180px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius);
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      display: block;
    }
    .btn-group { display: flex; gap: 10px; margin-top: 14px; }
    .btn-group button { flex: 1; }

    /* 按鈕 */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary   { background: var(--blue);  color: #fff; }
    .btn-green     { background: var(--green); color: #fff; }
    .btn-red       { background: var(--red);   color: #fff; }
    .btn-gray      { background: var(--gray-500); color: #fff; }
    .btn-submit { background: var(--blue); color: #fff; margin-top: 6px; font-size: 1.05rem; }

    /* 結果頁面 */
    #summaryArea { display: none; }
    .summary-box {
      background: var(--green-lt);
      border: 1.5px solid #5b7e96;
      border-radius: var(--radius);
      padding: 16px;
      font-size: .9rem;
      line-height: 1.9;
    }
    .summary-box strong { color: var(--green); }
    .absent-block {
      background: #fff;
      border: 1px dashed var(--gray-300);
      border-radius: 6px;
      padding: 10px;
      margin-top: 6px;
      white-space: pre-wrap;
      font-size: .88rem;
    }
    .refresh-hint { color: var(--red); font-weight: 600; font-size: .85rem; margin-top: 14px; text-align: center; }

    /* 分隔線 */
    .divider { border: none; border-top: 1px solid var(--gray-300); margin: 20px 0; }

    /* 開發人員 */
    footer { margin-top: 24px; font-size: .78rem; color: var(--gray-500); text-align: center; }

    /* 字元計數提示 */
    .char-counter {
      font-size: .75rem;
      color: var(--gray-500);
      text-align: right;
      margin-top: 3px;
    }
    .char-counter.warn { color: var(--red); font-weight: 600; }
  </style>
</head>

<div class="card">

  <div id="loadingArea" style="display:none;">

  <!-- 登入Google帳號頁面 -->

  <!-- 外部帳號登入 -->
  <div id="teacherAuthArea">

    <p>您的帳號不在學生名單中，請使用學校 Google帳號登入。</p>

    <div class="form-group">

    <div class="form-group" id="subTeacherGroup" style="display:none;">
      <label>代課老師姓名</label>

    <!-- 老師簽名 -->
    <div class="form-group">
      <label>老師簽名</label>
      <button id="sigOpenBtn" type="button" onclick="openSigModal()">點擊開啟簽名板</button>

    <!-- 簽名 Modal -->
    <div id="sigModal" class="modal-overlay">
      <div class="modal-content">
        <h3>老師請在此簽名</h3>
        <canvas id="sigCanvas"></canvas>
        <div class="btn-group">
          <button class="btn btn-red" type="button" onclick="clearCanvas()">清除重簽</button>
          <button class="btn btn-green" type="button" onclick="closeSigModal()">確認並關閉</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- 點名區 -->
    <div class="form-group">
      <label>點名區 <span id="attendCount" style="font-weight:400;color:var(--gray-500);font-size:.85rem;"></span></label>
      <div id="studentList" style="text-align:left;padding:24px;color:var(--gray-500);">
        <div class="spinner" style="margin:0 auto 10px;"></div>載入名單中…
      </div>
    </div>

    <!-- 送出 -->
    <button class="btn btn-submit" id="submitBtn" onclick="submitForm()">確認送出</button>
    <p style="text-align:center;margin-top:10px;">
      <a href="#" onclick="switchAccount(); return false;"
         style="font-size:.78rem;color:var(--gray-500);text-decoration:underline;">
        切換帳號／登出

  </div>
  <!-- 成功畫面 -->
  <div id="summaryArea">

      <div><strong>填寫人：</strong><span id="s_filler"></span></div>
      <div><strong>社課內容：</strong><span id="s_desc"></span></div>

      <div style="margin-top:8px;"><strong>缺席名單：</strong>
        <div class="absent-block" id="s_absent"></div>

    </div>
    <p class="refresh-hint">若需重新填寫，請重新整理頁面。</p>
  </div>

</div><!-- /card -->

<script>
  /* 設定 */
  const GAS_URL   = 'https://script.google.com/macros/s/AKfycby-nBw6O7YdUrXTOZ-2WR4A1o8FP68iwhVgmOOa1WbSWFlo_QLv6jUIjlbWH7S6dHrb/exec';
  const CLIENT_ID = '311035173241-nuamoemc7al4bhlp5p0nploepd6rg23h.apps.googleusercontent.com';
  
  const MAX_DESC_LEN    = 200;
  const MAX_TEACHER_LEN = 30;

  let userEmail      = '';
  let userFillerInfo = '';
  let canvas, ctx, isDrawing = false, hasSigned = false, isCanvasSized = false;
  let allStudents    = [];

  /* Google OAuth 初始化 */
  function initGoogleSignIn() {
    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: handleGoogleCredential,
      auto_select: true,
      cancel_on_tap_outside: false
    });
    showLoginButton();
    initDatePicker();
  }

  function showLoginButton() {
    const raw = localStorage.getItem('cachedUserInfo');
    if (raw) {
      try {
        const cached = JSON.parse(raw);
        const now    = Date.now();
        const CACHE_TTL =14 * 24 * 60 * 60 * 1000; // 兩周
        if (cached._ts && (now - cached._ts) < CACHE_TTL) {
          renderForm(cached);
          return;
        }
      } catch(e) { /* 快取損毀，清除 */ }
      localStorage.removeItem('cachedUserInfo');
    }
    document.getElementById('loadingArea').style.display = 'none';
    document.getElementById('loginArea').style.display   = 'block';
    google.accounts.id.renderButton(
      document.getElementById('g_id_signin'),
      { theme: 'outline', size: 'large', locale: 'zh-TW', text: 'signin_with' }
    );
  }

  /* 取得 Google credential 後解析 email */
  async function handleGoogleCredential(response) {
    document.getElementById('loginArea').style.display   = 'none';
    document.getElementById('loadingArea').style.display = 'block';
    try {
      const base64  = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      const payload = JSON.parse(atob(base64));
      const email   = payload.email;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('無效的帳號格式，請重試。');
        return;
      }
      await fetchUserInfo(email);
    } catch(e) {
      showError('登入憑證解析失敗，請重試。');
    }
  }

  /* 向系統後台查詢身分 */
  async function fetchUserInfo(email) {
    try {
      const res = await gasPost({ action: 'getLoginUser', email });
      handleUserInfo(res, email);
    } catch(err) {
      showError('無法連線至伺服器，請稍後再試。');
    }
  }

  function handleUserInfo(info, email) {
    document.getElementById('loadingArea').style.display = 'none';

    if (info.needManualLogin) {
      document.getElementById('teacherAuthArea').style.display = 'block';
      if (info.defaultEmail) document.getElementById('teacherEmail').value = info.defaultEmail;
      return;
    }
    if (info.error) { showError('驗證失敗，請重新整理頁面再試。'); return; }
    renderForm(info);
  }

  /* 建立表單 */
  function renderForm(info) {
    const toCache = Object.assign({}, info, { _ts: Date.now() });
    localStorage.setItem('cachedUserInfo', JSON.stringify(toCache));

    userEmail      = info.email  || '';
    userFillerInfo = (info.remark || '') + '-' + (info.class || '') + ' ' + (info.no || '') + ' ' + (info.name || '');

    document.getElementById('formArea').style.display = 'block';
    document.getElementById('club').value        = info.club    || '';
    document.getElementById('fillerName').value  = info.name    || '';
    document.getElementById('fillerInfo').value  = userFillerInfo;

    document.getElementById('identityClubName').value = (info.clubId || '') + ' ' + (info.club || '');
    document.getElementById('identityWriter').value   = (info.remark || '') + ' ' + (info.name || '');

    initCanvas();
    loadStudents(info.club);
  }

  /* 外部帳號登入 */
  async function submitTeacherAuth() {
    const email    = document.getElementById('teacherEmail').value.trim();
    const password = document.getElementById('teacherPassword').value.trim();
    const club     = document.getElementById('testClub').value.trim();

    if (!email || !password || !club) { alert('錯誤: 請完整填寫所有欄位！'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('錯誤: Email 格式不正確！'); return; }
    if (club.length > 30) { alert('錯誤: 社團名稱過長！'); return; }

    const btn = document.getElementById('teacherAuthBtn');
    btn.disabled = true; btn.textContent = '驗證中…';

    try {
      const res = await gasPost({ action: 'verifyTestLogin', email, password, club });
      btn.disabled = false; btn.textContent = '登入';
      if (res.error) { alert('❌ ' + res.msg); return; }
      document.getElementById('teacherAuthArea').style.display = 'none';
      renderForm(res);
    } catch(err) {
      btn.disabled = false; btn.textContent = '登入';
      alert('連線失敗，請稍後再試。');
    }
  }

  /* 日期 */
  function initDatePicker() {
    const input = document.getElementById('date');
    const today = new Date();
    const tz    = today.getTimezoneOffset() * 60000;
    const max   = new Date(today.getTime() - tz).toISOString().split('T')[0];
    const min   = new Date(today.getTime() - 4*86400000 - tz).toISOString().split('T')[0];
    input.max   = max;
    input.min   = min;
    input.value = max;
  }

  /* 代課老師顯示切換 */
  function toggleSubTeacher() {
    const present = document.getElementById('teacherPresent').value;
    const grp     = document.getElementById('subTeacherGroup');
    const inp     = document.getElementById('subTeacher');
    if (present === '否') {
      grp.style.display = 'block';
    } else {
      grp.style.display = 'none';
      inp.value = '無';
    }
  }

  /* 字元計數器 */
  function updateCharCounter(el, counterId, max) {
    const len     = el.value.length;
    const counter = document.getElementById(counterId);
    counter.textContent = len + ' / ' + max;
    counter.classList.toggle('warn', len >= max * 0.9);
  }

  /* 簽名板 */
  function initCanvas() {
    canvas = document.getElementById('sigCanvas');
    ctx    = canvas.getContext('2d');

    const getPos = (e) => {
      const r   = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - r.left, y: src.clientY - r.top };
    };
    const start = (e) => { isDrawing = true; draw(e); };
    const stop  = ()  => { isDrawing = false; ctx.beginPath(); };
    const draw  = (e) => {
      if (!isDrawing) return;
      e.preventDefault();
      hasSigned = true;
      const p = getPos(e);
      ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.lineTo(p.x, p.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
    };

    canvas.addEventListener('mousedown',  start);
    canvas.addEventListener('mousemove',  draw);
    canvas.addEventListener('mouseup',    stop);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove',  draw,  { passive: false });
    canvas.addEventListener('touchend',   stop);
  }

  function openSigModal() {
    document.getElementById('sigModal').classList.add('open');
    if (!isCanvasSized) {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      isCanvasSized = true;
    }
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSigned = false;
  }

  function closeSigModal() {
    document.getElementById('sigModal').classList.remove('open');
    document.getElementById('sigStatus').style.display = hasSigned ? 'block' : 'none';
  }

  /* 載入社員名單 */
  async function loadStudents(clubName) {
    try {
      const students = await gasPost({ action: 'getClubMembers', clubName });
      renderStudents(students);
    } catch(err) {
      document.getElementById('studentList').textContent = '名單載入失敗，請重新整理。';
    }
  }

  function renderStudents(students) {
    allStudents    = students;
    const listDiv  = document.getElementById('studentList');
    listDiv.innerHTML = '';

    if (!students || students.length === 0) {
      listDiv.textContent = '找不到該社團名單，請聯絡社活組。';
      return;
    }

    students.forEach(s => {
      const text = `${s.class} ${s.no} ${s.name}`;
      const item = document.createElement('div');
      item.className = 'student-item';

      const cb      = document.createElement('input');
      cb.type       = 'checkbox';
      cb.className  = 'student-cb';
      cb.value      = text;
      cb.id         = 'cb_' + s.id;
      cb.addEventListener('change', () => {
        item.classList.toggle('present', cb.checked);
        updateCount();
      });

      const lbl           = document.createElement('label');
      lbl.htmlFor         = cb.id;
      lbl.textContent     = text;   // ★ textContent，非 innerHTML

      item.appendChild(cb);
      item.appendChild(lbl);
      listDiv.appendChild(item);
    });

    updateCount();
  }

  function updateCount() {
    const total   = allStudents.length;
    const present = document.querySelectorAll('.student-cb:checked').length;
    document.getElementById('attendCount').textContent = `（出席 ${present} / ${total} 人）`;
  }

  /* 送出 */
  async function submitForm() {
    const btn = document.getElementById('submitBtn');

    const descEl = document.getElementById('desc');
    const desc   = descEl.value.trim();

    if (!desc) { alert('錯誤: 請填寫社課內容簡述！'); return; }
    if (desc.length > MAX_DESC_LEN) { alert(`錯誤: 社課內容不可超過 ${MAX_DESC_LEN} 字！`); return; }
    if (!hasSigned) { alert('錯誤: 請完成老師簽名！'); return; }

    const subTeacherEl  = document.getElementById('subTeacher');
    const subTeacherVal = subTeacherEl.value.trim() || '無';
    if (subTeacherVal.length > MAX_TEACHER_LEN) {
      alert(`錯誤: 代課老師姓名不可超過 ${MAX_TEACHER_LEN} 字！`);
      return;
    }

    const dateInput = document.getElementById('date');
    const dateVal   = dateInput.value;
    if (!dateVal || dateVal < dateInput.min || dateVal > dateInput.max) {
      alert('錯誤: 日期超出允許範圍！');
      return;
    }

    const checkboxes   = document.querySelectorAll('.student-cb');
    let   absentList   = [];
    let   presentCount = 0;

    checkboxes.forEach(cb => {
      if (cb.checked) presentCount++;
      else absentList.push(cb.value);
    });

    const data = {
      email:          userEmail,
      fillerInfo:     document.getElementById('fillerInfo').value,
      club:           document.getElementById('club').value,
      date:           dateVal,
      fillerName:     document.getElementById('fillerName').value,
      desc:           desc,
      teacherPresent: document.getElementById('teacherPresent').value,
      subTeacher:     subTeacherVal,
      presentCount:   presentCount,
      absentList:     absentList.length > 0 ? absentList.join('\n') : '全勤',
      signature:      hasSigned ? canvas.toDataURL('image/png') : ''
    };

    btn.disabled    = true;
    btn.textContent = '資料傳送中，請勿關閉網頁…';

    try {
      const res = await gasPost({ action: 'submitAttendance', data });
      if (res === 'SUCCESS' || res?.status !== 'error') {
        showSummary(data);
      } else {
        alert('送出失敗：' + (res.message || '未知錯誤'));
        btn.disabled    = false;
        btn.textContent = '確認送出';
      }
    } catch(err) {
      alert('連線失敗，請稍後再試。');
      btn.disabled    = false;
      btn.textContent = '確認送出';
    }
  }

  function showSummary(data) {
    document.getElementById('formArea').style.display    = 'none';
    document.getElementById('summaryArea').style.display = 'block';

    document.getElementById('s_club').textContent    = data.club;
    document.getElementById('s_date').textContent    = data.date;
    document.getElementById('s_filler').textContent  = data.fillerName;
    document.getElementById('s_desc').textContent    = data.desc;
    document.getElementById('s_teacher').textContent = data.teacherPresent + '（代課：' + data.subTeacher + '）';
    document.getElementById('s_present').textContent = String(data.presentCount);
    document.getElementById('s_absent').textContent  = data.absentList;
  }

  /* GAS API Helper */
  async function gasPost(body) {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return res.json();
  }

  /* 報錯 */
  function showError(msg) {
    const area = document.getElementById('loadingArea');
    area.innerHTML = '';
    const div = document.createElement('div');
    div.style.cssText = 'color:var(--red);font-size:.95rem;';
    div.textContent = msg;
    area.appendChild(div);
  }

  /* 切換帳號/登出 */
  function switchAccount() {
    localStorage.removeItem('cachedUserInfo');
    google.accounts.id.disableAutoSelect();
    location.reload();
  }
</script>
