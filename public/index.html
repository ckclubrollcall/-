<!DOCTYPE html>
<html lang="zh-TW">

<!-- 
沒事拜託不要亂玩我程式，你要玩我可以開一個全新的系統給你玩拜託不要搞算我求你
我真的用了很久拜託別玩，會造成學校和我很大的麻煩。

建中80屆學生社團審議委員會班聯會學生代表王宥鈞
電子郵件: dontplaymyrollcallsystemplease@duck.com
-->

<head>

  <!-- 網頁建置、預覽 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建中社團線上點名系統</title>
  <link rel="icon" href="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E7%A4%BE.png">
  <meta property="og:title" content="建中社團線上點名系統">
  <meta property="og:description" content="請使用@gl.ck.tp.edu.tw帳號填寫">
  <meta property="og:image"
    content="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E9%A0%90%E8%A6%BD.png">
  <meta property="og:type" content="website">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self';
    script-src 'self' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline' https://accounts.google.com;
    img-src 'self' https://raw.githubusercontent.com https://*.googleusercontent.com data:;
    connect-src https://script.google.com https://accounts.google.com https://script.googleusercontent.com/;
    frame-src https://accounts.google.com;
    base-uri 'self';
    object-src 'none';
    form-action 'self';">
  
  
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body data-page="login">

  <header id="siteHeader" style="cursor:pointer;">
    <div class="logo">
      <img src="https://raw.githubusercontent.com/ckclubrollcall/-/refs/heads/main/images/%E6%A0%A1%E5%BE%BD.png"
        style="width:38px;height:38px;object-fit:contain;" alt="建中校徽">
    </div>
    <div>
      <h1>建中社團線上點名系統</h1>
    </div>
  </header>

  <div class="card">

    <!-- 身分驗證頁面 -->
    <div id="loadingArea" style="display:none;">
      <div class="spinner"></div>
      驗證中...
    </div>

    <!-- 登入Google帳號頁面 -->
    <div id="loginArea">
      <p class="login-title">請使用學校 Google 帳號登入</p>
      <div id="g_id_signin"></div>
    </div>

    <!-- 外部帳號登入 -->
    <div id="teacherAuthArea">
      <h3>測試登入</h3>
      <p>您的帳號不在學生名單中，請使用學校 Google帳號登入。</p>
      <p>若欲測試本系統，請聯絡管理員協助建立測試用帳號與密碼。</p>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="teacherEmail" placeholder="請輸入電子郵件" maxlength="100" autocomplete="email">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="teacherPassword" placeholder="請輸入測試密碼" maxlength="100" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>社團</label>
        <input type="text" id="testClub" placeholder="需與現有社團名稱完全一致" maxlength="30">
      </div>
      <div class="form-group">
        <label>身分</label>
        <select id="testIdentity">
          <option value="幹部">幹部</option>
          <option value="社員">社員</option>
        </select>
      </div>
      <button class="btn btn-primary" id="teacherAuthBtn" style="margin-top:8px;">登入</button>
    </div>
    
  </div>
  <footer>開發人員：建中80屆社審會學代 王宥鈞</footer>

  <!-- 自訂彈出式視窗 Dialog Modal -->
  <div id="customDialog" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <h3 id="customDialogTitle" style="font-size: 1.15rem; margin-bottom: 12px; font-weight: 700;">提示</h3>
      <p id="customDialogMessage" style="font-size: 0.95rem; color: var(--gray-700); margin-bottom: 20px; line-height: 1.5; white-space: pre-line;"></p>
      <div class="btn-group" id="customDialogBtnGroup">
        <button class="btn btn-gray" id="customDialogCancelBtn" type="button" style="padding: 10px;">取消</button>
        <button class="btn btn-primary" id="customDialogConfirmBtn" type="button" style="padding: 10px;">確認</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  
  <script id="googleGsiScript" src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
